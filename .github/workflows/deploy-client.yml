name: E-Commerce Client CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
  pull_request:
    branches:
      - main
    paths:
      - "client/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Phase 1: CI (Continuous Integration) - Responsible for checking and building
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "client/package-lock.json"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      # - name: Lint check
      #   working-directory: ./client
      #   run: npm run lint

      - name: Run unit tests
        working-directory: ./client
        run: npm test -- --run

      - name: Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./client
        run: npm run e2e

      - name: Build project
        working-directory: ./client
        env:
          GITHUB_ACTIONS: true
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist

  # ==========================================
  # Phase 2: CD (Continuous Deployment) - Only deploy when pushed to main
  # ==========================================
  deploy-to-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
